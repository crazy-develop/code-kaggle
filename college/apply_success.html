<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Application Success - Suvidha</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #007c91;
      --secondary: #003366;
      --background: #f7fcff;
    }
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--background);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      text-align: center;
    }
    .success-card {
      background: white;
      padding: 50px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      max-width: 500px;
      animation: pop 0.5s ease-out;
    }
    @keyframes pop {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .checkmark {
      width: 80px;
      height: 80px;
      background: #10b981;
      color: white;
      font-size: 50px;
      line-height: 80px;
      border-radius: 50%;
      margin: 0 auto 20px;
    }
    h1 { color: var(--secondary); margin-bottom: 10px; }
    p { color: #666; margin-bottom: 30px; }
    .btn {
      background: var(--primary);
      color: white;
      padding: 15px 40px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s;
      display: inline-block;
    }
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0, 124, 145, 0.3);
    }
  </style>

  <meta name="google-adsense-account" content="ca-pub-3296618712266727">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3296618712266727" crossorigin="anonymous"></script>
</head>
<body>
  <div class="success-card">
    <div class="checkmark">✓</div>
    <h1>Application Submitted!</h1>
    <p>Your application for <strong>The Business School, University of Jammu</strong> has been received successfully. Our team will contact you soon.</p>
    <a href="../index.html" class="btn">Back to Home</a>
  </div>
</body>
</html>
