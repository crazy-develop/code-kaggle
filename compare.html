  <style>
    :root {

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {

      line-height: 1.6;
    }

    .container {
      max-width: 1400px;

      padding: 0 40px;
    }

    /* Professional Navbar Mockup */
    nav {
      background: white;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo { font-size: 1.5rem; font-weight: 800; color: var(--secondary); letter-spacing: -1px; }

    /* Comparison Hero */
    .compare-hero {

      color: white;
      padding: 80px 0 160px;
      text-align: center;
      margin-bottom: -100px;

    /* Main Comparison Grid Card */
    .main-grid-card {
      background: white;
      border-radius: 24px;
      padding: 50px;
      box-shadow: 0 25px 70px rgba(0,0,0,0.1);
      position: relative;
      z-index: 10;
      overflow-x: auto;
    }

    .comparison-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 15px;
    }

    .comparison-table th {
      background: #f8fafc;
      padding: 24px;
      text-align: left;
      font-size: 0.9rem;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      border-radius: 12px 0 0 12px;
    }

    .comparison-table td {
      padding: 24px;
      background: #ffffff;
      border-top: 1px solid #f1f5f9;
      border-bottom: 1px solid #f1f5f9;
      font-size: 1.05rem;
      color: var(--secondary);
      text-align: center;
    }

    .comparison-table td:last-child {
      border-right: 1px solid #f1f5f9;
      border-radius: 0 12px 12px 0;
    }

    .inst-card-header {
      padding: 20px;
    }

    .inst-card-header img {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    .inst-card-header h2 {
      font-size: 1.5rem;
      color: var(--secondary);
      margin-bottom: 5px;
    }

    .inst-card-header .type-badge {
      display: inline-block;
      padding: 4px 12px;
      background: #e0f2fe;
      color: #0369a1;
      font-size: 0.8rem;
      font-weight: 600;
      border-radius: 20px;
    }

    /* Value Comparison Styles */
    .highlight-win { font-weight: 700; color: var(--green); }
    .rating-badge { background: #fef3c7; color: #d97706; padding: 4px 10px; border-radius: 8px; font-weight: 700; }

    /* Performance Charts Container */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 30px;
      margin-top: 60px;
      margin-bottom: 60px;
    }

    .panel {
      background: white;
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.03);
      border: 1px solid #f1f5f9;
    }

    .panel h3 {
      font-size: 1.25rem;
      margin-bottom: 30px;
      color: var(--secondary);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .panel h3::before {
      content: '';
      width: 5px;
      height: 20px;
      background: var(--primary);
      border-radius: 10px;
    }

    }

    @media (max-width: 768px) {

      .compare-hero h1 { font-size: 2.2rem; }

  </style>

    window.onload = function() {
      let rawSelected = JSON.parse(localStorage.getItem('selectedColleges') || '[]');
      const selected = rawSelected.map(s => s.trim());
      
      if (selected.length < 1) {
        document.getElementById('main-content').innerHTML = `
          <div class="empty-state">
            <h2 style="font-size:2rem; margin-bottom:10px;">Select Institutions</h2>
            <p>You haven't selected any institutions yet. Go back to discover and compare.</p>
            <br>
            <a href="index.html" style="text-decoration:none; background:var(--primary); color:white; padding:15px 30px; border-radius:12px; display:inline-block; font-weight:700;">Explore Now</a>
          </div>`;
        return;
      }
      renderComparison(selected);
      renderCharts(selected);
    };

    function renderComparison(selected) {
      const area = document.getElementById('comparison-area');
      const table = document.createElement('table');
      table.className = 'comparison-table';

      const rows = [
        { label: "Overview", key: "header" },
        { label: "Rating / Score", key: "rating" },
        { label: "Est. Year", key: "established" },
        { label: "Location", key: "city" },
        { label: "Accreditation", key: "accreditation" },
        { label: "Annual Intake", key: "intake" },
        { label: "Faculty Size", key: "faculty" },
        { label: "Facilities", key: "facilities" }
      ];

      rows.forEach(row => {
        const tr = document.createElement('tr');
        const th = document.createElement('th');
        th.innerText = row.label;
        tr.appendChild(th);

        selected.forEach(name => {
          const data = institutionData[name] || { established: "TBD", type: "Unit", rating: "N/A", city: "-", accreditation: "-", intake: "-", faculty: "-", facilities: "-", img: "https://via.placeholder.com/120" };
          const td = document.createElement('td');

          if (row.key === "header") {
            td.innerHTML = `
              <div class="inst-card-header">
                <img src="${data.img}" alt="${name}">
                <h2>${name}</h2>
                <span class="type-badge">${data.type}</span>
              </div>`;
          } else if (row.key === "rating") {
            td.innerHTML = `<span class="rating-badge">${data.rating} / 5.0</span>`;
          } else {
            td.innerText = data[row.key];
          }
          tr.appendChild(td);
        });
        table.appendChild(tr);
      });

      area.appendChild(table);
    }

    function renderCharts(selected) {
      const parent = document.getElementById('analytics-grid');
      const labels = selected;
      
      const metrics = [
        { title: 'Annual Fee Matrix (₹)', data: selected.map(n => institutionData[n]?.fees || 0), color: '#00bfa6' },
        { title: 'Infrastructure Scale (Acres)', data: selected.map(n => institutionData[n]?.size || 0), color: '#0284c7' },
        { title: 'Success/Placement Analytics (%)', data: selected.map(n => institutionData[n]?.placements || 0), color: '#f59e0b' },
        { title: 'Peer Group Size (Intake)', data: selected.map(n => institutionData[n]?.intake || 0), color: '#6366f1' }
      ];

      metrics.forEach((m, i) => {
        const panel = document.createElement('div');
        panel.className = 'panel';
        panel.innerHTML = `<h3>${m.title}</h3><canvas id="chart-${i}"></canvas>`;
        parent.appendChild(panel);

        new Chart(document.getElementById(`chart-${i}`), {
          type: 'bar',
          data: {
            labels: labels,
            datasets: [{ label: m.title, data: m.data, backgroundColor: m.color, borderRadius: 12, barThickness: 40 }]
          },
          options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true, grid: { color: '#f1f5f9' } }, x: { grid: { display: false } } }
          }
        });
      });
    }
  </script>
