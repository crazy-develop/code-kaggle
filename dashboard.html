<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Profile - Premium Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #00d2ff;
      --secondary: #3a7bd5;
      --accent: #ff007a;
      --bg: #f0f4f8;
      --card-bg: rgba(255, 255, 255, 0.95);
      --text: #1e293b;
      --text-light: #64748b;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #eef2f3 0%, #8e9eab 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .profile-card {
      background: var(--card-bg);
      backdrop-filter: blur(15px);
      border-radius: 30px;
      width: 100%;
      max-width: 900px;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      display: flex;
      flex-direction: column;
      animation: slideUp 0.8s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header-banner {
      height: 200px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      position: relative;
    }

    .profile-img-container {
      position: absolute;
      bottom: -60px;
      left: 50%;
      transform: translateX(-50%);
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 6px solid white;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      background: white;
      overflow: hidden;
    }

    .profile-img-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .content-section {
      padding: 80px 40px 40px;
      text-align: center;
    }

    .user-name {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 5px;
    }

    .user-role {
      font-size: 1.1rem;
      color: var(--secondary);
      font-weight: 600;
      background: #eef2f3;
      padding: 5px 15px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 30px;
    }

    .details-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 25px;
      margin-bottom: 40px;
      text-align: left;
    }

    .detail-card {
      background: white;
      padding: 20px;
      border-radius: 20px;
      border: 1px solid #eef2f3;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .detail-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
    }

    .icon-box {
      width: 45px;
      height: 45px;
      background: #f0f7ff;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      color: var(--primary);
    }

    .detail-info h4 {
      font-size: 0.85rem;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .detail-info p {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
    }

    .action-group {
      display: flex;
      gap: 20px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .btn {
      flex: 1;
      min-width: 200px;
      padding: 16px 30px;
      border-radius: 15px;
      border: none;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-primary {
      background: var(--secondary);
      color: white;
      box-shadow: 0 10px 20px rgba(58, 123, 213, 0.2);
    }

    .btn-primary:hover {
      background: var(--primary);
      transform: translateY(-3px);
      box-shadow: 0 15px 25px rgba(58, 123, 213, 0.3);
    }

    .btn-logout {
      background: white;
      color: #ef4444;
      border: 2px solid #fee2e2;
    }

    .btn-logout:hover {
      background: #fee2e2;
      transform: translateY(-3px);
    }

    /* Mobile adjustments */
    @media (max-width: 600px) {
      .content-section {
        padding: 80px 20px 30px;
      }

      .user-name {
        font-size: 1.8rem;
      }

      .details-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>

  <meta name="google-adsense-account" content="ca-pub-3296618712266727">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3296618712266727" crossorigin="anonymous"></script>
</head>

<body>

  <div class="profile-card">
    <div id="google_translate_element" style="position: absolute; top: 15px; left: 15px; z-index: 1000;"></div>
    <div class="header-banner">
      <div class="profile-img-container">
        <img
          src="https://images.pexels.com/photos/220453/pexels-photo-220453.jpeg?auto=compress&cs=tinysrgb&dpr=1&w=500"
          alt="Avatar" id="userAvatar">
      </div>
    </div>

    <div class="content-section">
      <h1 class="user-name" id="profileName">Authenticating...</h1>
      <span class="user-role" id="profileRole">Please wait</span>

      <div class="details-grid">
        <div class="detail-card">
          <div class="icon-box">📧</div>
          <div class="detail-info">
            <h4>Email</h4>
            <p id="profileEmail">loading...</p>
          </div>
        </div>
        <div class="detail-card">
          <div class="icon-box">📍</div>
          <div class="detail-info">
            <h4>Location</h4>
            <p>Mathura, India</p>
          </div>
        </div>
        <div class="detail-card">
          <div class="icon-box">🛡️</div>
          <div class="detail-info">
            <h4>Security</h4>
            <p>Two-Factor: Active</p>
          </div>
        </div>
        <div class="detail-card">
          <div class="icon-box">🔥</div>
          <div class="detail-info">
            <h4>Sessions</h4>
            <p id="sessionCount">Verified User</p>
          </div>
        </div>
      </div>

      <div class="action-group">
        <a href="mentors.html" class="btn btn-primary">
          Explore Suvidha Platform →
        </a>
        <a href="https://www.whatin.in/" class="btn btn-primary" style="background:var(--accent);">Academic Platform 🎓</a>
        <button id="logoutBtn" class="btn btn-logout">
          Logout Securely
        </button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp, getApp, getApps } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";

    const roleConfigs = {
      student: './firebaseConfig/studentConfig.js',
      ngo: './firebaseConfig/ngoConfig.js',
      parent: './firebaseConfig/govConfig.js'
    };

    const userRole = localStorage.getItem("userRole") || "student";

    async function init() {
      try {
        const { firebaseConfig } = await import(roleConfigs[userRole]);

        // Use the same role-specific app name used during login
        const appName = "suvidha_" + userRole;
        let app = getApps().find(a => a.name === appName);
        if (!app) app = initializeApp(firebaseConfig, appName);

        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
          if (user) {
            const name = user.displayName || user.email.split('@')[0];
            document.getElementById("profileName").innerText = name.charAt(0).toUpperCase() + name.slice(1);
            document.getElementById("profileEmail").innerText = user.email;
            document.getElementById("profileRole").innerText = userRole.charAt(0).toUpperCase() + userRole.slice(1) + " Account";
          } else {
            // Check local storage for persistent hackathon state
            const localUser = localStorage.getItem("userEmail");
            if (localUser) {
              const name = localUser.split('@')[0];
              document.getElementById("profileName").innerText = name.charAt(0).toUpperCase() + name.slice(1);
              document.getElementById("profileEmail").innerText = localUser;
              document.getElementById("profileRole").innerText = userRole.charAt(0).toUpperCase() + userRole.slice(1) + " Account (Restored)";
            } else {
              console.log("No user found, redirecting...");
              window.location.href = "login.html";
            }
          }
        });

        document.getElementById("logoutBtn").addEventListener("click", async () => {
          if (confirm("Are you sure you want to logout?")) {
            await signOut(auth);
            localStorage.removeItem("loggedIn");
            localStorage.removeItem("userRole");
            localStorage.removeItem("userEmail");
            window.location.href = "login.html";
          }
        });

      } catch (err) {
        console.error("Init Error:", err);
        // Fallback or retry
      }
    }

    init();
  </script>
  <!-- Google Translate -->
  <script src="translate.js"></script>
  <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>

</html>
